# Active when SPRING_PROFILES_ACTIVE=local — overlays application.properties.
#
# Local stack runs Keycloak in a docker container reachable from inside the
# docker network at http://keycloak:8080, but the browser sees it at
# http://localhost:8081 (port mapped). Tokens emitted by Keycloak therefore
# carry `iss=http://localhost:8081/realms/cloud`. We tell Spring to:
#   - validate `iss` against that exact string (KEYCLOAK_ISSUER_URI env)
#   - fetch JWKS keys from the docker-internal hostname (so Spring boots OK)
#
# Spring Boot resolves jwk-set-uri itself when set, so it does NOT try to do
# OIDC discovery against issuer-uri at startup.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/cloud/protocol/openid-connect/certs

# What the frontend should redirect the browser to. Served by /api/config.
ducklake.frontend.keycloak-base=http://localhost:8081/realms/cloud/protocol/openid-connect
ducklake.frontend.client-id=ducklake
