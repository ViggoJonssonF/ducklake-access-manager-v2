name: Build and push to KTH cloud

# Triggered on every push to main and manually from the Actions tab.
# Builds the Dockerfile at the repo root and pushes the resulting image
# to the registry that KTH cloud's "Custom" deployment provides.
#
# Required GitHub Actions secrets (set in repo Settings → Secrets and
# variables → Actions). The exact names match what KTH cloud's
# deployment page shows after you create the deployment in Custom mode:
#
#   HARBOR_REGISTRY   — registry hostname, e.g. harbor.cloud.cbh.kth.se
#   HARBOR_USERNAME   — robot account name (KTH cloud generates this)
#   HARBOR_PASSWORD   — robot account secret
#   HARBOR_PROJECT    — project / namespace, e.g. your KTH username
#   IMAGE_NAME        — the deployment name, e.g. ducklake-access-manager-v2
#
# If KTH cloud uses different names on your deployment's Secrets page,
# rename them in the steps below to match.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ secrets.IMAGE_NAME }}:latest
            ${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
